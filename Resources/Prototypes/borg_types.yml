# Medical borg
- type: borgType
  id: medical

  # Description
  dummyPrototype: BorgChassisMedical

  # Functional
  extraModuleCount: 3
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleMedical

  defaultModules:
  - BorgModuleTool # Starlight
  - BorgModuleTreatment
  # - BorgModuleAdvancedTreatment # Frontier
  # - BorgModuleDefibrillator # Frontier
  - BorgModuleJetpack # Frontier

  radioChannels:
  - Science
  - Medical

  addComponents:
  - type: SolutionScanner
  - type: ShowHealthBars
    damageContainers:
    - Biological
    - Synth #HL
  - type: ShowHealthIcons
    damageContainers:
    - Biological

  # Visual
  inventoryTemplateId: borgDutchHL # HL
  spritePath: Mobs/Silicon/Chassis/medical/default.rsi
  spriteBodyMovementState: borg_moving

  # Pet
  petSuccessString: petting-success-medical-cyborg
  petFailureString: petting-failure-medical-cyborg

  # Sounds
  footstepCollection:
    collection: FootstepHoverBorg


